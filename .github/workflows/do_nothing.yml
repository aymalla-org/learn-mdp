name: Do Nothing

on:
  workflow_call:
    inputs:
      name:
        description: "Name of the component"
        required: true
        type: string
        default: "Nothing"
      calculation:
        description: "Results of the Calculation job"
        required: false
        type: string
jobs:
  build:
    runs-on: ["${{ vars.MDP_POOL_NAME }}"]
    steps:
      - name: Nothing
        run: echo "nothing" && sleep 10
