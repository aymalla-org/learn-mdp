# This workflow is designed to reproduce job stuck issue in MDP self-hosted runners.
name: mdp-test-job-stuck
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-job:
    runs-on: ["${{ vars.MDP_POOL_NAME }}"]
    name: Quick Job (~5s)
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Quick step
        run: |
          echo "Starting quick job..."
          sleep 2
          echo "Quick job completed!"
